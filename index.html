<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Player</title>
<link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
<style>
:root {
  --bg: #000;
  --text: #ddd;
  --text-dim: #777;
  --accent: #e55;
  --sub-size: 1.2em;
  --sub-pos: 0px;
  --sub-gap: 1.15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:18px/1.6 'Segoe UI','Helvetica Neue',Arial,sans-serif;overflow-x:hidden}
a{color:var(--text)}

/* video */
video.video-js{width:100%;aspect-ratio:16/9;background:#000}

/* layout */
.wrap{max-width:1200px;margin:0 auto;padding:16px 24px 40px}

/* episode rows */
.ep{display:flex;align-items:center;gap:16px;padding:14px 8px;border-bottom:1px solid #111;cursor:pointer}
.ep:last-child{border-bottom:none}
.ep:hover{background:#0a0a0a}
.ep.on{background:#0d0d0d}
.ep-n{color:var(--text-dim);min-width:28px;text-align:right;font-size:20px;font-weight:600}
.ep-name{flex:1;font-size:20px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-time{color:var(--text-dim);min-width:60px;text-align:right;font-size:16px}
.ep-bar{height:4px;background:#111;width:140px;flex-shrink:0;border-radius:2px}
.ep-bar-i{height:100%;background:var(--accent);border-radius:2px}

/* controls */
.ctrls{display:flex;flex-wrap:wrap;gap:10px;padding:12px 0;border-bottom:1px solid #111}
.c{background:none;color:var(--text);border:1px solid #333;padding:10px 20px;cursor:pointer;font:16px/1 'Segoe UI',Arial,sans-serif;font-weight:500;border-radius:4px}
.c:hover{color:var(--text);border-color:#555;background:#111}
.cv{color:var(--text-dim);padding:10px 12px;font:16px/1 'Segoe UI',Arial,sans-serif}

/* toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:100px;background:#111;color:var(--text);padding:12px 28px;font:18px/1 'Segoe UI',Arial,sans-serif;font-weight:500;opacity:0;pointer-events:none;transition:opacity .15s;z-index:9999;border-radius:6px}
.toast.show{opacity:1}

/* osd */
.osd{position:fixed;top:30px;right:30px;background:#111;color:var(--text);padding:14px 24px;font:22px/1 'Segoe UI',Arial,sans-serif;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99999;border-radius:6px}
.osd.show{opacity:1}

/* footer */
.ft{text-align:center;color:var(--text-dim);font:14px/1 'Segoe UI',Arial,sans-serif;padding:20px 0}

/* video.js overrides */
.vjs-text-track-display{transform:translateY(var(--sub-pos))!important}
.vjs-text-track-display *{line-height:var(--sub-gap)!important;margin:0!important}
.vjs-text-track-display>div>div>div{background:transparent!important;color:#fff;font-weight:400;font-family:monospace;text-shadow:0 0 4px #000,0 0 8px #000;font-size:var(--sub-size)!important}
body.sub-bold .vjs-text-track-display>div>div>div{font-weight:800}
.vjs-subs-caps-button,.vjs-play-control,.vjs-picture-in-picture-control,.vjs-volume-panel,.vjs-big-play-button{display:none!important}
.vjs-fullscreen-control{position:absolute;left:-9999px;opacity:0}
.vjs-control-bar{background:transparent!important}
.vjs-slider{background:rgba(255,255,255,.08)!important;height:2px}
.vjs-play-progress{background:var(--accent)!important}
</style>
</head>
<body>

<div class="wrap">
  <video id="v" class="video-js" controls preload="auto" data-setup='{"fluid":true}'>
    <source src="/Stranger.Things.S05E01.1080p.WEB-DL.Hindi.5.1-English.5.1.ESub.x264-HDHub4u.Ms.mp4" type="video/mp4" />
  </video>

  <div id="ep" style="padding-top:8px"></div>

  <div style="padding-top:14px;font-size:14px;color:var(--text-dim);font-weight:500">Subtitle Sync</div>
  <div class="ctrls">
    <button class="c" onclick="shift(-100)">-100ms</button>
    <div id="sd" class="cv">0 ms</div>
    <button class="c" onclick="shift(100)">+100ms</button>
  </div>

  <div style="padding-top:10px;font-size:14px;color:var(--text-dim);font-weight:500">Subtitle Style</div>
  <div class="ctrls">
    <button class="c" onclick="chgGap(-0.05)">gap-</button>
    <button class="c" onclick="chgGap(0.05)">gap+</button>
    <button class="c" onclick="chgSz(-0.1)">sz-</button>
    <button class="c" onclick="chgSz(0.1)">sz+</button>
    <button class="c" onclick="chgPos(-15)">up</button>
    <button class="c" onclick="chgPos(15)">down</button>
  </div>
</div>

<div id="t" class="toast"></div>
<div id="o" class="osd"></div>
<div class="ft">player</div>

<script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
<script>
const E=[
  {t:"Movie 1",d:"0m10s",s:"https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_30MB.mp4",c:""},
  {t:"Movie 2",d:"1h41m",s:"/John Wick 2014.mp4",c:"/John Wick 2014.vtt"},
  {t:"Movie 3",d:"2h15m",s:"/Sadak1991.mp4",c:"Sadak1991.vtt"},
  {t:"Movie 4",d:"2h23m",s:"/movie2.mp4",c:"/movie2.vtt"},
  {t:"Movie 5",d:"2h20m",s:"/movie3.mp4",c:"movie3.vtt"},
  {t:"Movie 6",d:"2h10m",s:"/movie4.mp4",c:"movie4.vtt"},
  {t:"Movie 7",d:"2h00m",s:"/Jugnuma.The.Fable.2025.mp4",c:"/[SubtitleTools.com] Jugnuma.The.Fable.2025.1080p.Hindi.WEB-DL.5.1.ESub.x264-HDHub4u.Ms.mkv3.vtt"},
  {t:"Movie 8",d:"2h10m",s:"/Harry Potter and the Deathly Hallows - Part II.mp4",c:"/[SubtitleTools.com] Harry Potter and the Deathly Hallows - Part II 2011 1080p Open-Matte DS4K SDR 10bit WEBRip [Hindi DDP 5.1 + English DDP 5.1] MSubs PeruGuy-4kHdHub.mkv6.vtt"}
];

const KE="sp_ep",KT="sp_tm",KP="sp_pg",KA="sp_au",KSZ="sp_sz",KPO="sp_po",KG="sp_gg";
const P=videojs("v");
const epEl=document.getElementById("ep");
const tEl=document.getElementById("t");
const oEl=document.getElementById("o");
const sdEl=document.getElementById("sd");

let ci=parseInt(localStorage.getItem(KE),10);
if(isNaN(ci)||ci<0||ci>=E.length)ci=0;
let st=parseFloat(localStorage.getItem(KT))||0;
let pm=JSON.parse(localStorage.getItem(KP)||"{}");
let am=JSON.parse(localStorage.getItem(KA)||"{}");
let off=0,sz=parseFloat(localStorage.getItem(KSZ))||1.2,pos=parseInt(localStorage.getItem(KPO))||0,gap=parseFloat(localStorage.getItem(KG))||1.15,ot;

function toast(x,t=1e3){tEl.textContent=x;tEl.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>tEl.classList.remove("show"),t)}
function osd(x,t=1800){oEl.textContent=x;oEl.classList.add("show");clearTimeout(ot);ot=setTimeout(()=>oEl.classList.remove("show"),t)}

function bld(){
  epEl.innerHTML="";
  E.forEach((e,i)=>{
    const p=pm[i]||0;
    const d=document.createElement("div");
    d.className="ep"+(i===ci?" on":"");
    d.innerHTML=`<span class="ep-n">${i+1}</span><span class="ep-name">${e.t}</span><span class="ep-time">${e.d}</span><div class="ep-bar"><div class="ep-bar-i" data-i="${i}" style="width:${p}%"></div></div>`;
    d.onclick=()=>{st=0;localStorage.setItem(KT,"0");ld(i,0)};
    epEl.appendChild(d);
  });
}

function ld(i,r=1){
  ci=i;localStorage.setItem(KE,i);off=0;updSd();
  bld();
  const e=E[i];
  P.pause();P.src({type:"video/mp4",src:e.s});
  clr();if(e.c)P.addRemoteTextTrack({kind:"subtitles",src:e.c,srclang:"en",label:"en"},false);
  const fo=()=>{const tt=P.textTracks();if(tt)for(let j=0;j<tt.length;j++)if(tt[j].kind==="subtitles")tt[j].mode="showing"};
  setTimeout(fo,200);P.one("loadedmetadata",fo);
  P.one("loadedmetadata",()=>{try{if(r&&st>0)P.currentTime(st);}catch(e){}setTimeout(()=>{const a=(am[ci]!=null)?am[ci]:0;setA(a)},200);P.play()});
}

function clr(){try{const r=P.remoteTextTracks();const x=[];for(let i=0;i<r.length;i++)x.push(r[i]);x.forEach(t=>P.removeRemoteTextTrack(t))}catch(e){}}

function apSt(){document.documentElement.style.setProperty('--sub-size',sz+'em');document.documentElement.style.setProperty('--sub-pos',pos+'px');document.documentElement.style.setProperty('--sub-gap',gap)}
function chgGap(d){gap=Math.max(.6,Math.min(2.5,gap+d));gap=+gap.toFixed(2);localStorage.setItem(KG,gap);apSt();osd("gap "+gap)}
function chgSz(d){sz=Math.max(.5,Math.min(3,sz+d));sz=+sz.toFixed(1);localStorage.setItem(KSZ,sz);apSt();osd("size "+Math.round(sz*100)+"%")}
function chgPos(d){pos+=localStorage.setItem(KPO,pos);apSt();osd(pos>0?"down "+pos:pos<0?"up "+Math.abs(pos):"center")}
function updSd(){sdEl.textContent=off>0?"+"+off+" ms":off+" ms"}
function shift(d){const tt=P.textTracks();let f=0;for(let i=0;i<tt.length;i++){if(tt[i].kind==="subtitles"){const c=tt[i].cues;if(c&&c.length){f=1;const ds=d/1000;for(let j=0;j<c.length;j++){c[j].startTime+=ds;c[j].endTime+=ds}}}}if(f){off+=d;updSd();osd((off>0?"+":"")+off+" ms")}else osd("loading...")}

function gAT(){try{if(typeof P.audioTracks==="function"){const a=P.audioTracks();if(a&&a.length)return a}}catch(e){}try{const t=P.tech&&P.tech();if(t&&t.el&&t.el().audioTracks)return t.el().audioTracks}catch(e){}try{const m=P.el();if(m&&m.audioTracks)return m.audioTracks}catch(e){}return null}
function wAT(t=2500){return new Promise((r,j)=>{const s=Date.now();(function c(){const a=gAT();if(a&&a.length)return r(a);if(Date.now()-s>t)return j();setTimeout(c,120)})()})}
async function setA(i){try{const a=await wAT();const x=Math.max(0,Math.min(i,a.length-1));for(let j=0;j<a.length;j++)try{a[j].enabled=(j===x)}catch(e){}am[ci]=x;localStorage.setItem(KA,JSON.stringify(am));toast(a[x].label||"Track "+(x+1))}catch(e){toast("no tracks")}}
async function togA(){try{const a=await wAT();const c=(am[ci]!=null)?am[ci]:0;await setA((c+1)%a.length)}catch(e){toast("no tracks")}}

P.on("timeupdate",()=>{const t=P.currentTime(),d=P.duration()||0;localStorage.setItem(KT,t);st=t;if(d>0){const p=Math.min(100,t/d*100);pm[ci]=p;localStorage.setItem(KP,JSON.stringify(pm));const el=document.querySelector(`.ep-bar-i[data-i="${ci}"]`);if(el)el.style.width=p+"%"}});
P.ready(()=>{if(P.tech&&P.tech().el)P.tech().el().style.objectFit="contain";setTimeout(()=>{const tt=P.textTracks();if(tt)for(let i=0;i<tt.length;i++)if(tt[i].kind==="subtitles")tt[i].mode="showing"},300)});

document.addEventListener("keydown",e=>{
  const k=e.key,c=e.keyCode;
  if(k==="8"||c===56){e.preventDefault();shift(100);return}
  if(k==="0"||c===48){e.preventDefault();shift(-100);return}
  if(k==="1"||c===49){e.preventDefault();chgGap(-.05);return}
  if(k==="3"||c===51){e.preventDefault();chgGap(.05);return}
  if(k==="4"||c===52){e.preventDefault();chgSz(-.1);return}
  if(k==="6"||c===54){e.preventDefault();chgSz(.1);return}
  if(k==="2"||c===50){e.preventDefault();chgPos(-15);return}
  if(k==="5"||c===53){e.preventDefault();chgPos(15);return}
  if(c===404||k.toLowerCase()==="g"){e.preventDefault();togA();return}
  if(c===403||k.toLowerCase()==="r"){e.preventDefault();if(P.isFullscreen())P.exitFullscreen();else P.requestFullscreen();return}
  if(c===405||k.toLowerCase()==="y"){e.preventDefault();P.currentTime(0);pm[ci]=0;localStorage.setItem(KP,JSON.stringify(pm));const el=document.querySelector(`.ep-bar-i[data-i="${ci}"]`);if(el)el.style.width="0%";P.play();return}
  if(c===406||k.toLowerCase()==="b"){e.preventDefault();document.body.classList.toggle("sub-bold");return}
});

apSt();bld();ld(ci,1);
</script>
</body>
</html>
