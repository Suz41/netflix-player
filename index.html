<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cinema Player</title>

<link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #0a0a08;
  --surface: #111110;
  --surface-2: #1a1917;
  --border: #2a2825;
  --accent: #c9953a;
  --accent-dim: rgba(201,149,58,0.15);
  --accent-glow: rgba(201,149,58,0.4);
  --text: #e8e4dc;
  --text-muted: #7a756b;
  --text-dim: #504d47;
  --red: #b33a3a;
  --sub-size: 1.2em;
  --sub-pos: 0px;
  --sub-gap: 1.15;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── film grain overlay ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9990;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ── header ── */
header {
  padding:28px 32px 20px;
  display:flex;
  align-items:center;
  gap:16px;
  position:relative;
}

.header-dot {
  width:8px;
  height:8px;
  background:var(--accent);
  border-radius:50%;
  box-shadow:0 0 12px var(--accent-glow);
}

.header-title {
  font-family:'Playfair Display',serif;
  font-size:20px;
  font-weight:600;
  color:var(--text);
  letter-spacing:0.5px;
}

.header-sub {
  font-size:12px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
}

.header-spacer{flex:1}

.header-badge {
  font-size:11px;
  color:var(--accent);
  border:1px solid var(--border);
  padding:4px 12px;
  border-radius:20px;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* ── main layout ── */
main {
  max-width:1040px;
  margin:0 auto;
  padding:0 24px 40px;
}

/* ── video wrapper ── */
.video-wrapper {
  position:relative;
  border-radius:8px;
  overflow:hidden;
  border:1px solid var(--border);
  margin-bottom:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.video-wrapper::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius:8px;
  pointer-events:none;
  box-shadow:inset 0 0 80px rgba(0,0,0,0.3);
}

.video-js {
  width:100%;
  aspect-ratio:16/9;
  background:#000;
}

/* ── section panels ── */
.panel {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:16px;
  overflow:hidden;
}

.panel-header {
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.panel-title {
  font-family:'Playfair Display',serif;
  font-size:15px;
  font-weight:600;
}

.panel-hint {
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:0.5px;
}

.panel-body {
  padding:14px 18px;
}

/* ── controls row ── */
.ctrl-row {
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.ctrl-btn {
  background:var(--surface-2);
  color:var(--text);
  border:1px solid var(--border);
  padding:7px 14px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  transition:all 0.15s;
  white-space:nowrap;
}

.ctrl-btn:hover {
  background:var(--accent-dim);
  border-color:var(--accent);
  color:var(--accent);
}

.ctrl-val {
  font-family:'DM Mono',monospace;
  font-size:13px;
  color:var(--text-muted);
  min-width:64px;
  text-align:center;
}

.ctrl-spacer{flex:1}

/* ── episode list ── */
.ep-list {
  padding:6px 0;
}

.ep-item {
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 18px;
  cursor:pointer;
  transition:background 0.15s;
  border-bottom:1px solid rgba(255,255,255,0.03);
  position:relative;
}

.ep-item:last-child{border-bottom:none}
.ep-item:hover{background:var(--surface-2)}
.ep-item.active{background:var(--accent-dim)}

.ep-item.active::before {
  content:'';
  position:absolute;
  left:0;
  top:12px;
  bottom:12px;
  width:3px;
  background:var(--accent);
  border-radius:0 2px 2px 0;
}

.ep-num {
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-weight:700;
  color:var(--text-dim);
  min-width:28px;
  text-align:center;
}

.ep-item.active .ep-num{color:var(--accent)}

.ep-thumb {
  width:100px;
  aspect-ratio:16/9;
  overflow:hidden;
  background:#000;
  border-radius:5px;
  border:1px solid var(--border);
  flex-shrink:0;
}

.ep-thumb video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.ep-info{flex:1;min-width:0}

.ep-name {
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:3px;
}

.ep-desc {
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:6px;
}

.ep-bar {
  height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}

.ep-bar-fill {
  height:100%;
  background:var(--accent);
  border-radius:2px;
  transition:width 0.2s;
}

.ep-time {
  font-size:12px;
  color:var(--text-dim);
  min-width:50px;
  text-align:right;
}

/* ── now playing ── */
.now-playing {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 18px;
  border-bottom:1px solid var(--border);
}

.np-pulse {
  width:8px;
  height:8px;
  background:var(--accent);
  border-radius:50%;
  animation:npPulse 1.5s ease infinite;
}

@keyframes npPulse {
  0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}
  50%{box-shadow:0 0 0 6px transparent}
}

.np-label {
  font-size:11px;
  color:var(--accent);
  letter-spacing:2px;
  text-transform:uppercase;
}

.np-title {
  font-family:'Playfair Display',serif;
  font-size:15px;
  font-weight:600;
}

/* ── toast ── */
.toast {
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:100px;
  background:rgba(10,10,8,0.92);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 24px;
  border-radius:8px;
  font-weight:600;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s, transform 0.2s;
  z-index:9999;
  backdrop-filter:blur(12px);
}

.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

/* ── TV OSD ── */
.tv-osd {
  position:fixed;
  top:40px;
  right:40px;
  background:rgba(10,10,8,0.92);
  border:1px solid var(--accent);
  color:var(--text);
  padding:14px 28px;
  border-radius:10px;
  font-size:1.3rem;
  font-weight:700;
  font-family:'Playfair Display',serif;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s;
  z-index:99999;
  box-shadow:0 0 30px rgba(201,149,58,0.15);
  backdrop-filter:blur(12px);
}

.tv-osd.show{opacity:1}

/* ── footer ── */
footer {
  text-align:center;
  color:var(--text-dim);
  font-size:11px;
  padding:20px;
  letter-spacing:1px;
}

/* ── Video.js overrides ── */
.vjs-text-track-display{transform:translateY(var(--sub-pos))!important}
.vjs-text-track-display *{line-height:var(--sub-gap)!important;margin:0!important}
.vjs-text-track-display>div>div>div{
  background:transparent!important;
  color:#fff;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  padding:0 0.35em!important;
  border-radius:.25em;
  text-shadow:0 0 3px #000,0 0 6px #000,0 0 10px rgba(0,0,0,0.8);
  font-size:var(--sub-size)!important;
}
body.sub-bold .vjs-text-track-display>div>div>div{font-weight:800}

.vjs-subs-caps-button,.vjs-play-control,.vjs-picture-in-picture-control,.vjs-volume-panel,.vjs-big-play-button{display:none!important}
.vjs-fullscreen-control{position:absolute;left:-9999px;opacity:0}
.vjs-control-bar{background:transparent!important;padding-inline:4px}
.vjs-slider{background:rgba(255,255,255,.1)!important;height:4px;border-radius:999px}
.vjs-play-progress{background:var(--accent)!important}

/* ── responsive ── */
@media(max-width:640px){
  header{padding:18px 16px 14px}
  main{padding:0 12px 30px}
  .ep-thumb{width:72px}
  .ctrl-btn{padding:6px 10px;font-size:12px}
}
</style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <div class="header-title">Cinema</div>
  <div class="header-spacer"></div>
  <div class="header-badge">Private Screening</div>
</header>

<main>
  <!-- Video Player -->
  <div class="video-wrapper">
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"fluid":true}'>
      <source src="/Stranger.Things.S05E01.1080p.WEB-DL.Hindi.5.1-English.5.1.ESub.x264-HDHub4u.Ms.mp4" type="video/mp4" />
      <p class="vjs-no-js">Enable JavaScript to watch the video.</p>
    </video>
  </div>

  <!-- Now Playing -->
  <div class="panel">
    <div class="now-playing">
      <div class="np-pulse"></div>
      <div class="np-label">Now Playing</div>
      <div style="flex:1"></div>
      <div class="np-title" id="npTitle">Loading...</div>
    </div>

    <!-- Episode List -->
    <div class="ep-list" id="episodesList"></div>
  </div>

  <!-- Subtitle Sync -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Subtitle Sync</div>
      <div class="panel-hint">Keys: 0 delay &middot; 8 advance</div>
    </div>
    <div class="panel-body">
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="shiftSubtitles(-100)">&larr; -100ms</button>
        <div id="syncDisplay" class="ctrl-val">0 ms</div>
        <button class="ctrl-btn" onclick="shiftSubtitles(100)">+100ms &rarr;</button>
      </div>
    </div>
  </div>

  <!-- Subtitle Appearance -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Subtitle Style</div>
      <div class="panel-hint">4/6 size &middot; 2/5 position &middot; 1/3 gap</div>
    </div>
    <div class="panel-body">
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="changeSubGap(-0.05)">- Gap</button>
        <button class="ctrl-btn" onclick="changeSubGap(0.05)">+ Gap</button>
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <button class="ctrl-btn" onclick="changeSubSize(-0.1)">- Size</button>
        <button class="ctrl-btn" onclick="changeSubSize(0.1)">+ Size</button>
        <div style="width:1px;height:20px;background:var(--border)"></div>
        <button class="ctrl-btn" onclick="changeSubPos(-15)">Up</button>
        <button class="ctrl-btn" onclick="changeSubPos(15)">Down</button>
      </div>
    </div>
  </div>
</main>

<!-- Displays -->
<div id="toast" class="toast" aria-hidden="true"></div>
<div id="tvOsd" class="tv-osd" aria-hidden="true"></div>

<footer>Cinema Player &mdash; Private Collection</footer>

<script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
<script>
// ── Episodes ──
const episodes = [
  { title:"Tu Yaa Main (2026)", desc:"Hindi • WEB-DL", time:"1h31m", src:"/Tu.Yaa.Main.2026.1080p.NF.WEB-DL.Hindi.DDP5.1.ESub.x264-HDHub4u.Ms.mp4", cc:"/Tu.Yaa.Main.2026.1080p.NF.WEB-DL.Hindi.DDP5.1.ESub.x264-HDHub4u.Ms.vtt" },
  { title:"John Wick (2014)", desc:"Action • Keanu Reeves", time:"1h41m", src:"/John Wick 2014.mp4", cc:"/John Wick 2014.vtt" },
  { title:"Sadak (1991)", desc:"Drama • Sanjay Dutt", time:"2h15m", src:"/Sadak1991.mp4", cc:"Sadak1991.vtt" },
  { title:"The Chronicles of Narnia (2005)", desc:"Fantasy • Adventure", time:"2h23m", src:"/movie2.mp4", cc:"/movie2.vtt" },
  { title:"ABCD (2013)", desc:"Dance • Remo D'Souza", time:"2h20m", src:"/movie3.mp4", cc:"movie3.vtt" },
  { title:"Harry Potter: Deathly Hallows Part 2 (2011)", desc:"Fantasy • Final Chapter", time:"2h10m", src:"/movie4.mp4", cc:"movie4.vtt" },
  { title:"Jugnuma: The Fable (2025)", desc:"Hindi • Fantasy Drama", time:"2h00m", src:"/Jugnuma.The.Fable.2025.mp4", cc:"/[SubtitleTools.com] Jugnuma.The.Fable.2025.1080p.Hindi.WEB-DL.5.1.ESub.x264-HDHub4u.Ms.mkv3.vtt" },
  { title:"Harry Potter: Deathly Hallows Part 2 (Open-Matte)", desc:"Fantasy • Open-Matte 4K", time:"2h10m", src:"/Harry Potter and the Deathly Hallows - Part II.mp4", cc:"/[SubtitleTools.com] Harry Potter and the Deathly Hallows - Part II 2011 1080p Open-Matte DS4K SDR 10bit WEBRip [Hindi DDP 5.1 + English DDP 5.1] MSubs PeruGuy-4kHdHub.mkv6.vtt" }
];

const K_EP="st5_current_episode";
const K_TIME="st5_current_time";
const K_PROGRESS="st5_progress_map";
const K_AUDIO="st5_audio_map";
const K_SUB_SIZE="st5_sub_size";
const K_SUB_POS="st5_sub_pos";
const K_SUB_GAP="st5_sub_gap";

const player=videojs("my-video");
const episodesList=document.getElementById("episodesList");
const toastEl=document.getElementById("toast");
const syncDisplay=document.getElementById("syncDisplay");
const tvOsd=document.getElementById("tvOsd");
const npTitle=document.getElementById("npTitle");

let currentEpisode=parseInt(localStorage.getItem(K_EP),10);
if(isNaN(currentEpisode)||currentEpisode<0||currentEpisode>=episodes.length)currentEpisode=0;
let savedTime=parseFloat(localStorage.getItem(K_TIME))||0;
let progressMap=JSON.parse(localStorage.getItem(K_PROGRESS)||"{}");
let audioMap=JSON.parse(localStorage.getItem(K_AUDIO)||"{}");

let subtitleOffsetMs=0;
let subSize=parseFloat(localStorage.getItem(K_SUB_SIZE))||1.2;
let subPos=parseInt(localStorage.getItem(K_SUB_POS))||0;
let subGap=parseFloat(localStorage.getItem(K_SUB_GAP))||1.15;
let tvOsdTimeout;

// ── Toast & OSD ──
function showToast(text,ms=1200){
  toastEl.textContent=text;
  toastEl.classList.add("show");
  toastEl.setAttribute("aria-hidden","false");
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>{toastEl.classList.remove("show");toastEl.setAttribute("aria-hidden","true");},ms);
}

function showTvOsd(text,ms=2000){
  tvOsd.textContent=text;
  tvOsd.classList.add("show");
  clearTimeout(tvOsdTimeout);
  tvOsdTimeout=setTimeout(()=>{tvOsd.classList.remove("show");},ms);
}

// ── Build Episode List ──
function buildList(){
  episodesList.innerHTML='';
  episodes.forEach((ep,i)=>{
    const pct=progressMap[i]||0;
    const row=document.createElement("div");
    row.className="ep-item"+(i===currentEpisode?" active":"");
    row.dataset.i=i;
    row.innerHTML=`
      <div class="ep-num">${i+1}</div>
      <div class="ep-thumb"><video src="${ep.src}" muted preload="metadata"></video></div>
      <div class="ep-info">
        <div class="ep-name">${ep.title}</div>
        <div class="ep-desc">${ep.desc}</div>
        <div class="ep-bar"><div class="ep-bar-fill" data-i="${i}" style="width:${pct}%"></div></div>
      </div>
      <div class="ep-time">${ep.time}</div>
    `;
    row.addEventListener("click",()=>{savedTime=0;localStorage.setItem(K_TIME,"0");loadEpisode(i,false);});
    episodesList.appendChild(row);
  });

  // thumbs seek to 5s
  document.querySelectorAll(".ep-thumb video").forEach(v=>{
    v.addEventListener("loadedmetadata",()=>{try{v.currentTime=Math.min(5,v.duration||0);}catch(e){}});
  });

  updateNowPlaying();
}

function updateNowPlaying(){
  const ep=episodes[currentEpisode];
  if(ep) npTitle.textContent=ep.title;
}

function refreshActive(){
  document.querySelectorAll(".ep-item").forEach(el=>el.classList.remove("active"));
  const rows=document.querySelectorAll(".ep-item");
  if(rows[currentEpisode])rows[currentEpisode].classList.add("active");
  updateNowPlaying();
}

// ── Subtitle Style ──
function applySubtitleStyle(){
  document.documentElement.style.setProperty('--sub-size',`${subSize}em`);
  document.documentElement.style.setProperty('--sub-pos',`${subPos}px`);
  document.documentElement.style.setProperty('--sub-gap',`${subGap}`);
}

function changeSubGap(delta){
  subGap=Math.max(0.6,Math.min(2.5,subGap+delta));
  subGap=parseFloat(subGap.toFixed(2));
  localStorage.setItem(K_SUB_GAP,subGap);
  applySubtitleStyle();
  showTvOsd(`Line Gap: ${subGap}`);
}

function changeSubSize(delta){
  subSize=Math.max(0.5,Math.min(3.0,subSize+delta));
  subSize=parseFloat(subSize.toFixed(1));
  localStorage.setItem(K_SUB_SIZE,subSize);
  applySubtitleStyle();
  showTvOsd(`Text Size: ${Math.round(subSize*100)}%`);
}

function changeSubPos(delta){
  subPos+=delta;
  localStorage.setItem(K_SUB_POS,subPos);
  applySubtitleStyle();
  const dir=subPos>0?"Down":(subPos<0?"Up":"Center");
  showTvOsd(`Position: ${dir} (${Math.abs(subPos)}px)`);
}

function updateSyncDisplay(){
  if(syncDisplay) syncDisplay.textContent=subtitleOffsetMs>0?`+${subtitleOffsetMs} ms`:`${subtitleOffsetMs} ms`;
}

function shiftSubtitles(deltaMs){
  const tracks=player.textTracks();
  let found=false;
  for(let i=0;i<tracks.length;i++){
    const track=tracks[i];
    if(track.kind==="subtitles"||track.kind==="captions"){
      const cues=track.cues;
      if(cues&&cues.length>0){
        found=true;
        const ds=deltaMs/1000;
        for(let j=0;j<cues.length;j++){cues[j].startTime+=ds;cues[j].endTime+=ds;}
      }
    }
  }
  if(found){
    subtitleOffsetMs+=deltaMs;
    updateSyncDisplay();
    const sign=subtitleOffsetMs>0?'+':'';
    showTvOsd(`Delay: ${sign}${subtitleOffsetMs} ms`);
  } else {
    showTvOsd("Subtitles loading...");
  }
}

// ── Audio Tracks ──
function getAudioTracks(){
  try{if(typeof player.audioTracks==="function"){const at=player.audioTracks();if(at&&at.length)return at;}}catch(e){}
  try{const tech=player.tech&&player.tech();if(tech&&tech.el&&tech.el().audioTracks)return tech.el().audioTracks;}catch(e){}
  try{const media=player.el();if(media&&media.audioTracks)return media.audioTracks;}catch(e){}
  return null;
}

function waitAudioTracks(timeout=2500){
  return new Promise((resolve,reject)=>{
    const start=Date.now();
    (function check(){
      const at=getAudioTracks();
      if(at&&at.length)return resolve(at);
      if(Date.now()-start>timeout)return reject(new Error("no-audio-tracks"));
      setTimeout(check,120);
    })();
  });
}

async function setAudioIndex(index){
  try{
    const at=await waitAudioTracks(2500);
    const idx=Math.max(0,Math.min(index,at.length-1));
    for(let i=0;i<at.length;i++){try{at[i].enabled=(i===idx);}catch(e){}}
    audioMap[currentEpisode]=idx;
    localStorage.setItem(K_AUDIO,JSON.stringify(audioMap));
    const label=(at[idx]&&(at[idx].label||at[idx].language))||("Track "+(idx+1));
    showToast(label);
  }catch(e){showToast("Audio tracks unavailable");}
}

async function toggleAudio(){
  try{
    const at=await waitAudioTracks(2500);
    const cur=(audioMap[currentEpisode]!=null)?audioMap[currentEpisode]:0;
    const nxt=(cur+1)%at.length;
    await setAudioIndex(nxt);
  }catch(e){showToast("No audio tracks");}
}

// ── Subtitle Loading ──
function clearRemoteTextTracks(){
  try{
    const remote=player.remoteTextTracks();
    const toRemove=[];
    for(let i=0;i<remote.length;i++)toRemove.push(remote[i]);
    toRemove.forEach(t=>player.removeRemoteTextTrack(t));
  }catch(e){}
}

function addSubtitles(src){
  clearRemoteTextTracks();
  if(!src)return;
  player.addRemoteTextTrack({kind:"subtitles",src,srclang:"en",label:"English"},false);
  const forceOn=()=>{
    const tt=player.textTracks();
    if(tt&&tt.length)for(let i=0;i<tt.length;i++)if(tt[i].kind==="subtitles"||tt[i].kind==="captions")tt[i].mode="showing";
  };
  setTimeout(forceOn,220);
  player.one("loadedmetadata",forceOn);
}

// ── Episode Loading ──
function loadEpisode(index,resume=true){
  currentEpisode=index;
  localStorage.setItem(K_EP,String(index));
  subtitleOffsetMs=0;
  updateSyncDisplay();
  refreshActive();

  const ep=episodes[index];
  player.pause();
  player.src({type:"video/mp4",src:ep.src});
  addSubtitles(ep.cc);

  player.one("loadedmetadata",()=>{
    const tt=player.textTracks();
    if(tt&&tt.length)for(let i=0;i<tt.length;i++)if(tt[i].kind==="subtitles"||tt[i].kind==="captions")tt[i].mode="showing";
    try{const r=(resume?savedTime:0)||0;if(r>0)player.currentTime(r);}catch(e){}
    setTimeout(()=>{
      const saved=(audioMap[currentEpisode]!=null)?audioMap[currentEpisode]:0;
      setAudioIndex(saved);
    },250);
    player.play();
  });
}

// ── Player Events ──
player.on("timeupdate",()=>{
  const t=player.currentTime();
  const d=player.duration()||0;
  localStorage.setItem(K_TIME,String(t));
  savedTime=t;
  if(d>0){
    const pct=Math.min(100,(t/d)*100);
    progressMap[currentEpisode]=pct;
    localStorage.setItem(K_PROGRESS,JSON.stringify(progressMap));
    const el=document.querySelector(`.ep-bar-fill[data-i="${currentEpisode}"]`);
    if(el)el.style.width=pct+"%";
  }
});

player.ready(()=>{
  if(player.tech&&player.tech().el)player.tech().el().style.objectFit="contain";
  setTimeout(()=>{
    const tt=player.textTracks();
    if(tt&&tt.length)for(let i=0;i<tt.length;i++)if(tt[i].kind==="subtitles"||tt[i].kind==="captions")tt[i].mode="showing";
  },300);
});

// ── Keyboard ──
function handleKey(e){
  const code=e.keyCode||e.which||0;
  const key=(e.key||"").toString();
  const codeStr=(e.code||"").toString();

  // Subtitle sync: 0/8
  if(key==="8"||code===56){e.preventDefault();shiftSubtitles(100);return;}
  if(key==="0"||code===48){e.preventDefault();shiftSubtitles(-100);return;}

  // Gap: 1/3
  if(key==="1"||code===49){e.preventDefault();changeSubGap(-0.05);return;}
  if(key==="3"||code===51){e.preventDefault();changeSubGap(0.05);return;}

  // Size: 4/6
  if(key==="4"||code===52){e.preventDefault();changeSubSize(-0.1);return;}
  if(key==="6"||code===54){e.preventDefault();changeSubSize(0.1);return;}

  // Position: 2/5
  if(key==="2"||code===50){e.preventDefault();changeSubPos(-15);return;}
  if(key==="5"||code===53){e.preventDefault();changeSubPos(15);return;}

  // Green = audio toggle
  const isGreen=(code===404)||(code===71)||(code===103)||key.toLowerCase()==="g"||codeStr==="KeyG"||key.toLowerCase().includes("green")||code===407;
  if(isGreen){e.preventDefault();showToast("Green pressed",700);toggleAudio();return;}

  // Red = fullscreen
  if(code===403||key.toLowerCase()==="r"||codeStr==="KeyR"){e.preventDefault();if(player.isFullscreen&&player.isFullscreen())player.exitFullscreen();else if(player.requestFullscreen)player.requestFullscreen();return;}

  // Yellow = restart
  if(code===405||key.toLowerCase()==="y"||codeStr==="KeyY"){e.preventDefault();player.currentTime(0);progressMap[currentEpisode]=0;localStorage.setItem(K_PROGRESS,JSON.stringify(progressMap));const el=document.querySelector(`.ep-bar-fill[data-i="${currentEpisode}"]`);if(el)el.style.width="0%";player.play();return;}

  // Blue = bold toggle
  if(code===406||key.toLowerCase()==="b"||codeStr==="KeyB"){e.preventDefault();document.body.classList.toggle("sub-bold");return;}
}

window.addEventListener("keydown",handleKey);

// ── Init ──
window.addEventListener("load",()=>{
  applySubtitleStyle();
  buildList();
  loadEpisode(currentEpisode,true);
});

window.__toggleAudio=toggleAudio;
window.__setAudioIndex=setAudioIndex;
</script>
