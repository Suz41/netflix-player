<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Player</title>
<style>
:root {
  --bg: #000;
  --text: #ddd;
  --text-dim: #777;
  --accent: #e55;
  --sub-size: 1.4em;
  --sub-pos: 0px;
  --sub-gap: 1.15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:18px/1.6 'Segoe UI','Helvetica Neue',Arial,sans-serif;overflow-x:hidden}

/* video */
#v{width:100%;aspect-ratio:16/9;background:#000;display:block;object-fit:contain}

/* layout */
.wrap{max-width:1200px;margin:0 auto;padding:16px 24px 40px}

/* episode rows */
.ep{display:flex;align-items:center;gap:16px;padding:14px 8px;border-bottom:1px solid #111;cursor:pointer}
.ep:last-child{border-bottom:none}
.ep:hover{background:#080808}
.ep.on{background:#0a0a0a}
.ep-n{color:var(--text-dim);min-width:28px;text-align:right;font-size:20px;font-weight:600}
.ep-name{flex:1;font-size:20px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-bar{height:4px;background:#111;width:140px;flex-shrink:0;border-radius:2px}
.ep-bar-i{height:100%;background:var(--accent);border-radius:2px}

/* controls */
.ctrls{display:flex;flex-wrap:wrap;gap:10px;padding:12px 0;border-bottom:1px solid #111}
.c{background:none;color:var(--text);border:1px solid #333;padding:10px 20px;cursor:pointer;font:16px/1 'Segoe UI',Arial,sans-serif;font-weight:500;border-radius:4px}
.c:hover{color:var(--text);border-color:#555;background:#111}
.cv{color:var(--text-dim);padding:10px 12px;font:16px/1 'Segoe UI',Arial,sans-serif}

/* toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:100px;background:#111;color:var(--text);padding:12px 28px;font:18px/1 'Segoe UI',Arial,sans-serif;font-weight:500;opacity:0;pointer-events:none;transition:opacity .15s;z-index:9999;border-radius:6px}
.toast.show{opacity:1}

/* osd */
.osd{position:fixed;top:30px;right:30px;background:#111;color:var(--text);padding:14px 24px;font:22px/1 'Segoe UI',Arial,sans-serif;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99999;border-radius:6px}
.osd.show{opacity:1}

/* subtitles overlay */
#subs{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:10}
#subs span{background:rgba(0,0,0,0.8);padding:4px 12px;border-radius:4px;font-size:var(--sub-size);line-height:var(--sub-gap);font-weight:500;color:#fff;text-shadow:0 0 4px #000}
body.sub-bold #subs span{font-weight:800}

/* footer */
.ft{text-align:center;color:var(--text-dim);font:14px/1 'Segoe UI',Arial,sans-serif;padding:20px 0}

/* video container */
.vid-wrap{position:relative}
</style>
</head>
<body>

<div class="wrap">
  <div class="vid-wrap">
    <video id="v" controls preload="auto" autoplay></video>
    <div id="subs"><span id="sub-text"></span></div>
  </div>

  <div id="ep" style="padding-top:8px"></div>

  <div style="padding-top:14px;font-size:14px;color:var(--text-dim);font-weight:500">Subtitle Sync</div>
  <div class="ctrls">
    <button class="c" onclick="shift(-100)">-100ms</button>
    <div id="sd" class="cv">0 ms</div>
    <button class="c" onclick="shift(100)">+100ms</button>
  </div>

  <div style="padding-top:10px;font-size:14px;color:var(--text-dim);font-weight:500">Subtitle Style</div>
  <div class="ctrls">
    <button class="c" onclick="chgGap(-0.05)">gap-</button>
    <button class="c" onclick="chgGap(0.05)">gap+</button>
    <button class="c" onclick="chgSz(-0.1)">sz-</button>
    <button class="c" onclick="chgSz(0.1)">sz+</button>
    <button class="c" onclick="chgPos(-15)">up</button>
    <button class="c" onclick="chgPos(15)">down</button>
  </div>
</div>

<div id="t" class="toast"></div>
<div id="o" class="osd"></div>
<div class="ft">player</div>

<script>
const E=[
  {t:"Movie 1",d:"0m10s",s:"bigbuckbunny.mp4",c:"test.vtt"},
  {t:"Movie 2",d:"0m10s",s:"movie2.mp4",c:"test.vtt"},
  {t:"Movie 3",d:"0m10s",s:"movie3.mp4",c:"test.vtt"},
  {t:"Movie 4",d:"0m10s",s:"movie4.mp4",c:"test.vtt"},
  {t:"Movie 5",d:"0m10s",s:"movie5.mp4",c:"test.vtt"}
];

const KE="sp_ep",KT="sp_tm",KP="sp_pg",KA="sp_au",KSZ="sp_sz",KPO="sp_po",KG="sp_gg";
const V=document.getElementById("v");
const epEl=document.getElementById("ep");
const tEl=document.getElementById("t");
const oEl=document.getElementById("o");
const sdEl=document.getElementById("sd");
const subText=document.getElementById("sub-text");

let ci=parseInt(localStorage.getItem(KE),10);
if(isNaN(ci)||ci<0||ci>=E.length)ci=0;
let st=parseFloat(localStorage.getItem(KT))||0;
let pm=JSON.parse(localStorage.getItem(KP)||"{}");
let am=JSON.parse(localStorage.getItem(KA)||"{}");
let off=0,sz=parseFloat(localStorage.getItem(KSZ))||1.4,pos=parseInt(localStorage.getItem(KPO))||0,gap=parseFloat(localStorage.getItem(KG))||1.15,ot;
let srtCues=[];

function toast(x,t=1e3){tEl.textContent=x;tEl.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>tEl.classList.remove("show"),t)}
function osd(x,t=1800){oEl.textContent=x;oEl.classList.add("show");clearTimeout(ot);ot=setTimeout(()=>oEl.classList.remove("show"),t)}

// SRT parser
function parseSRT(text){
  const cues=[];
  const blocks=text.trim().replace(/\r\n/g,"\n").split("\n\n");
  blocks.forEach(b=>{
    const lines=b.split("\n");
    if(lines.length<3)return;
    const m=lines[1].match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
    if(!m)return;
    const s=+m[1]*3600+ +m[2]*60+ +m[3]+ +m[4]/1000;
    const e=+m[5]*3600+ +m[6]*60+ +m[7]+ +m[8]/1000;
    cues.push({s,e,t:lines.slice(2).join("\n").replace(/<[^>]+>/g,"")});
  });
  return cues;
}

// VTT parser
function parseVTT(text){
  const cues=[];
  const blocks=text.trim().replace(/\r\n/g,"\n").split("\n\n");
  blocks.forEach(b=>{
    const lines=b.split("\n");
    if(lines.length<2)return;
    let start=-1;
    for(let i=0;i<lines.length;i++){
      const m=lines[i].match(/(\d{2}):(\d{2}):(\d{2})[.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[.](\d{3})/);
      if(m){
        start=+m[1]*3600+ +m[2]*60+ +m[3]+ +m[4]/1000;
        const end=+m[5]*3600+ +m[6]*60+ +m[7]+ +m[8]/1000;
        cues.push({s:start,e:end,t:lines.slice(i+1).join("\n").replace(/<[^>]+>/g,"")});
        break;
      }
    }
  });
  return cues;
}

function bld(){
  epEl.innerHTML="";
  E.forEach((e,i)=>{
    const p=pm[i]||0;
    const d=document.createElement("div");
    d.className="ep"+(i===ci?" on":"");
    d.innerHTML=`<span class="ep-n">${i+1}</span><span class="ep-name">${e.t}</span><div class="ep-bar"><div class="ep-bar-i" data-i="${i}" style="width:${p}%"></div></div>`;
    d.onclick=()=>{st=0;localStorage.setItem(KT,"0");ld(i,0)};
    epEl.appendChild(d);
  });
}

function ld(i,r=1){
  ci=i;localStorage.setItem(KE,i);off=0;updSd();
  bld();
  const e=E[i];
  V.pause();
  V.src=e.s;
  V.load();
  srtCues=[];
  subText.textContent="";

  if(e.c){
    fetch(e.c).then(r=>r.text()).then(t=>{
      srtCues=e.c.endsWith(".vtt")?parseVTT(t):parseSRT(t);
    }).catch(()=>{});
  }

  V.onloadedmetadata=function(){
    if(r&&st>0)try{V.currentTime=st}catch(e){}
    const a=(am[ci]!=null)?am[ci]:0;
    setA(a);
    V.play().catch(()=>{});
  };
}

// Subtitle rendering
V.addEventListener("timeupdate",()=>{
  const t=V.currentTime,d=V.duration||0;
  localStorage.setItem(KT,t);st=t;
  if(d>0){
    const p=Math.min(100,t/d*100);
    pm[ci]=p;localStorage.setItem(KP,JSON.stringify(pm));
    const el=document.querySelector(`.ep-bar-i[data-i="${ci}"]`);
    if(el)el.style.width=p+"%";
  }
  // render subs
  if(srtCues.length){
    const c=srtCues.find(c=>t>=c.s&&t<=c.e);
    subText.textContent=c?c.t:"";
  }else{
    subText.textContent="";
  }
});

// Subtitle style
function apSt(){
  document.documentElement.style.setProperty('--sub-size',sz+'em');
  document.documentElement.style.setProperty('--sub-pos',pos+'px');
  document.documentElement.style.setProperty('--sub-gap',gap);
  document.getElementById("subs").style.bottom=(60+pos*-1)+"px";
}
function chgGap(d){gap=Math.max(.6,Math.min(2.5,gap+d));gap=+gap.toFixed(2);localStorage.setItem(KG,gap);apSt();osd("gap "+gap)}
function chgSz(d){sz=Math.max(.5,Math.min(3,sz+d));sz=+sz.toFixed(1);localStorage.setItem(KSZ,sz);apSt();osd("size "+Math.round(sz*100)+"%")}
function chgPos(d){pos+=d;localStorage.setItem(KPO,pos);apSt();osd(pos>0?"down "+pos:pos<0?"up "+Math.abs(pos):"center")}
function updSd(){sdEl.textContent=off>0?"+"+off+" ms":off+" ms"}

function shift(d){
  if(!srtCues.length){osd("no subs");return}
  const ds=d/1000;
  srtCues.forEach(c=>{c.s+=ds;c.e+=ds});
  off+=d;updSd();osd((off>0?"+":"")+off+" ms");
}

// Audio tracks
function setA(i){
  const at=V.audioTracks;
  if(!at||!at.length){toast("no tracks");return}
  const x=Math.max(0,Math.min(i,at.length-1));
  for(let j=0;j<at.length;j++)try{at[j].enabled=(j===x)}catch(e){}
  am[ci]=x;localStorage.setItem(KA,JSON.stringify(am));
  toast(at[x].label||"Track "+(x+1));
}
function togA(){
  const at=V.audioTracks;
  if(!at||!at.length){toast("no tracks");return}
  const c=(am[ci]!=null)?am[ci]:0;
  setA((c+1)%at.length);
}

// Fullscreen
function goFS(){
  const w=document.querySelector(".vid-wrap");
  if(document.fullscreenElement)document.exitFullscreen();
  else w.requestFullscreen();
}

document.addEventListener("keydown",e=>{
  const k=e.key,c=e.keyCode;
  if(k==="8"||c===56){e.preventDefault();shift(100);return}
  if(k==="0"||c===48){e.preventDefault();shift(-100);return}
  if(k==="1"||c===49){e.preventDefault();chgGap(-.05);return}
  if(k==="3"||c===51){e.preventDefault();chgGap(.05);return}
  if(k==="4"||c===52){e.preventDefault();chgSz(-.1);return}
  if(k==="6"||c===54){e.preventDefault();chgSz(.1);return}
  if(k==="2"||c===50){e.preventDefault();chgPos(-15);return}
  if(k==="5"||c===53){e.preventDefault();chgPos(15);return}
  if(c===404||k.toLowerCase()==="g"){e.preventDefault();togA();return}
  if(c===403||k.toLowerCase()==="r"){e.preventDefault();goFS();return}
  if(c===405||k.toLowerCase()==="y"){e.preventDefault();V.currentTime=0;pm[ci]=0;localStorage.setItem(KP,JSON.stringify(pm));const el=document.querySelector(`.ep-bar-i[data-i="${ci}"]`);if(el)el.style.width="0%";V.play();return}
  if(c===406||k.toLowerCase()==="b"){e.preventDefault();document.body.classList.toggle("sub-bold");return}
});

apSt();bld();ld(ci,1);
</script>
</body>
</html>
