<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

.player-container {
  width: 100%;
  max-width: 960px;
  position: relative;
}

video {
  width: 100%;
  display: block;
  border-radius: 4px;
}

.controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 0 0 4px 4px;
}

.player-container:hover .controls { opacity: 1; }

.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-bar:hover { height: 6px; }

.progress-filled {
  height: 100%;
  background: #e50914;
  border-radius: 2px;
  width: 0%;
  position: relative;
}

.progress-filled::after {
  content: '';
  width: 14px;
  height: 14px;
  background: #e50914;
  border-radius: 50%;
  position: absolute;
  right: -7px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0;
  transition: opacity 0.2s;
}

.progress-bar:hover .progress-filled::after { opacity: 1; }

.btn-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn svg { width: 28px; height: 28px; fill: #fff; }

.time-display {
  color: #ddd;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}

.spacer { flex: 1; }

.volume-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.volume-slider {
  width: 0;
  opacity: 0;
  transition: width 0.2s, opacity 0.2s;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  outline: none;
}

.volume-group:hover .volume-slider { width: 80px; opacity: 1; }

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
  cursor: pointer;
}

.speed-select {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}

.speed-select option { background: #222; }
</style>
</head>
<body>

<div class="player-container">
  <video id="video" src=""></video>

  <div class="controls">
    <div class="progress-bar" id="progressBar">
      <div class="progress-filled" id="progressFilled"></div>
    </div>

    <div class="btn-row">
      <button class="ctrl-btn" id="playBtn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="skipBack">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
      <button class="ctrl-btn" id="skipForward">
        <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
      </button>
      <div class="volume-group">
        <button class="ctrl-btn" id="muteBtn">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
      </div>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
      <div class="spacer"></div>
      <select class="speed-select" id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
      <button class="ctrl-btn" id="pipBtn">
        <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
      </button>
      <button class="ctrl-btn" id="fullscreenBtn">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const playBtn = document.getElementById('playBtn');
const progressBar = document.getElementById('progressBar');
const progressFilled = document.getElementById('progressFilled');
const timeDisplay = document.getElementById('timeDisplay');
const volumeSlider = document.getElementById('volumeSlider');
const muteBtn = document.getElementById('muteBtn');
const speedSelect = document.getElementById('speedSelect');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const pipBtn = document.getElementById('pipBtn');
const container = document.querySelector('.player-container');

const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const pauseIcon = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
const volHigh = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
const volMute = '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';

function togglePlay() {
  video.paused ? video.play() : video.pause();
}

video.addEventListener('play', () => playBtn.innerHTML = pauseIcon);
video.addEventListener('pause', () => playBtn.innerHTML = playIcon);

playBtn.addEventListener('click', togglePlay);
video.addEventListener('click', togglePlay);

video.addEventListener('timeupdate', () => {
  const pct = (video.currentTime / video.duration) * 100;
  progressFilled.style.width = pct + '%';
  timeDisplay.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
});

progressBar.addEventListener('click', e => {
  const rect = progressBar.getBoundingClientRect();
  video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
});

volumeSlider.addEventListener('input', () => {
  video.volume = volumeSlider.value;
  muteBtn.innerHTML = video.volume == 0 ? volMute : volHigh;
});

muteBtn.addEventListener('click', () => {
  video.muted = !video.muted;
  muteBtn.innerHTML = video.muted ? volMute : volHigh;
  volumeSlider.value = video.muted ? 0 : video.volume;
});

speedSelect.addEventListener('change', () => video.playbackRate = speedSelect.value);

fullscreenBtn.addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else container.requestFullscreen();
});

pipBtn.addEventListener('click', () => {
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else video.requestPictureInPicture();
});

document.getElementById('skipBack').addEventListener('click', () => video.currentTime -= 10);
document.getElementById('skipForward').addEventListener('click', () => video.currentTime += 10);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') video.currentTime += 10;
  if (e.code === 'ArrowLeft') video.currentTime -= 10;
  if (e.code === 'KeyM') muteBtn.click();
  if (e.code === 'KeyF') fullscreenBtn.click();
});

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + sec;
}
</script>
</body>
</html>
